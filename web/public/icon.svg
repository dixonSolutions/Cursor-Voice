<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Cursor Voice">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Outer ring (inactive state colour) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#334155" stroke-width="4"/>
  <!-- Inner ring (accent) -->
  <circle cx="256" cy="256" r="168" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
  <!-- Microphone body -->
  <rect x="220" y="136" width="72" height="128" rx="36" fill="#6366f1"/>
  <!-- Microphone stand arm -->
  <path d="M176 264 C176 320 176 336 256 336 C336 336 336 320 336 264"
        fill="none" stroke="#6366f1" stroke-width="12" stroke-linecap="round"/>
  <!-- Stand pole -->
  <line x1="256" y1="336" x2="256" y2="376"
        stroke="#6366f1" stroke-width="12" stroke-linecap="round"/>
  <!-- Stand base -->
  <line x1="208" y1="376" x2="304" y2="376"
        stroke="#6366f1" stroke-width="12" stroke-linecap="round"/>
</svg>
