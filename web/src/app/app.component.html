<p-toast position="top-center" />

<p-dialog
  header="Cursor Voice"
  [visible]="!bridge.hasCredentials()"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '92vw', maxWidth: '28rem' }">

  <p-fluid>
    <p-message
      severity="info"
      variant="simple"
      text="Enter the app token from your bridge .env file. It stays on this device only." />

    <p-iftalabel>
      <p-password
        inputId="token-input"
        [(ngModel)]="tokenInput"
        placeholder="Paste token here…"
        [feedback]="false"
        [toggleMask]="true"
        (keydown.enter)="onSaveToken()" />
      <label for="token-input">App Token</label>
    </p-iftalabel>

    <p-iftalabel>
      <input
        pInputText
        id="bridge-url"
        type="text"
        [(ngModel)]="bridgeUrlInput"
        placeholder="https://machine.ts.net"
        (keydown.enter)="onSaveToken()" />
      <label for="bridge-url">Bridge URL (optional)</label>
    </p-iftalabel>

    <p-message
      severity="secondary"
      variant="simple"
      text="Open http://localhost:4200 in dev. Leave Bridge URL blank — /api and /ws proxy to the bridge." />

    <p-button
      label="Save & Connect"
      icon="pi pi-check"
      [fluid]="true"
      (onClick)="onSaveToken()" />
  </p-fluid>
</p-dialog>

@if (bridge.hasCredentials()) {
  <div class="cv-shell">
    <header class="cv-shell-header">
      <p-toolbar class="cv-topbar">
        <ng-template #start>
          <p-avatar icon="pi pi-microphone" shape="circle" />
          <p-tag value="Cursor Voice" severity="secondary" />
        </ng-template>

        <ng-template #center>
          <nav class="cv-tabnav" aria-label="Main">
            @for (tab of visibleTabs(); track tab.id) {
              <p-button
                [label]="tab.label"
                [icon]="tab.icon"
                [text]="!isActiveTab(tab.id)"
                [severity]="isActiveTab(tab.id) ? 'primary' : 'secondary'"
                (onClick)="setTab(tab.id)" />
            }
          </nav>
        </ng-template>

        <ng-template #end>
          <p-tag
            [value]="statusLabel()"
            [severity]="statusSeverity()"
            [icon]="statusIcon()" />
        </ng-template>
      </p-toolbar>

      <cv-live-log-panel />
    </header>

    <main class="cv-main">
      @switch (activeTab()) {
        @case ('voice') {
          <cv-voice-tab />
        }
        @case ('wake') {
          <cv-wake-word-test />
        }
        @case ('providers') {
          <cv-providers-tab />
        }
        @case ('connection') {
          <cv-connection-tab />
        }
        @case ('logs') {
          <cv-logs-tab />
        }
      }
    </main>
  </div>
}
