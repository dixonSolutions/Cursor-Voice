<p-card header="Voice">
  <p-fluid>
    <p-iftalabel>
      <p-select
        inputId="project-select"
        [options]="projectOptions()"
        [(ngModel)]="selectedProject"
        optionLabel="label"
        optionValue="value"
        placeholder="Select a project…"
        [disabled]="projectOptions().length === 0 || !isBridgeConnected()"
        (onChange)="onProjectChange(selectedProject)"
        [fluid]="true" />
      <label for="project-select">Active project</label>
    </p-iftalabel>

    @if (activeProviderLabel(); as provider) {
      <div class="cv-voice-summary">
        <span>Using</span>
        <p-tag [value]="provider" severity="info" />
        @if (activeModelLabel(); as model) {
          <p-tag [value]="model" severity="secondary" />
        }
      </div>
      <p-message
        severity="secondary"
        variant="simple"
        text="Research runs via headless cursor-agent CLI on this machine — not the Cursor IDE Agents sidebar." />
    } @else {
      <p-message
        severity="warn"
        variant="simple"
        text="No voice provider configured. Add keys under Providers &amp; Models." />
    }

    <div
      class="cv-voice-orb-stage"
      [class.cv-voice-orb-stage--session]="
        voiceSession.conversationActive() || voiceSession.sessionConnecting()
      ">
      @if (voiceSession.toolActivity(); as tool) {
        <div
          class="cv-voice-tool-activity"
          [class.cv-voice-tool-activity--active]="tool.phase === 'start'"
          [class.cv-voice-tool-activity--error]="tool.phase === 'error'">
          <span class="cv-voice-tool-activity-kicker">Live</span>
          <span class="cv-voice-tool-activity-label">{{ tool.label }}</span>
        </div>
      }
      <button
        type="button"
        class="cv-voice-orb-btn"
        [attr.aria-label]="pttAriaLabel()"
        [disabled]="pttDisabled()"
        (click)="handlePtt()">
        <cv-voice-orb
          [spectrum]="voiceSession.audioSpectrum()"
          [live]="voiceSession.conversationActive()"
          [dimmed]="pttDisabled()"
          [expanded]="
            voiceSession.conversationActive() || voiceSession.sessionConnecting()
          " />
      </button>
      <p class="cv-voice-orb-caption">{{ orbStateLabel() }}</p>
      <p class="cv-voice-orb-hint">{{ wakeHint() }}</p>
    </div>
  </p-fluid>
</p-card>

<p-card header="Activation phrase">
  <p-fluid>
    <p-message
      severity="secondary"
      variant="simple"
      text="Say this phrase to activate the assistant after tapping the orb. Only tapping the orb ends the call — no spoken stop word." />

    <p-fieldset legend="Phrase">
      <p-iftalabel>
        <input
          pInputText
          id="wake-start"
          [(ngModel)]="wakeStart"
          placeholder="From config.json"
          [disabled]="!isBridgeConnected()" />
        <label for="wake-start">Activation phrase</label>
      </p-iftalabel>

      <p-button
        label="Save activation phrase"
        icon="pi pi-save"
        [loading]="savingWakeWords"
        [disabled]="!isBridgeConnected()"
        (onClick)="onSaveWakeWords()" />
    </p-fieldset>
  </p-fluid>
</p-card>
