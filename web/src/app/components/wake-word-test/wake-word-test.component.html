<p-card header="Wake &amp; end phrase test">
  <div class="cv-wake-test">
    <div
      class="cv-wake-test-orb"
      [ngClass]="orbClass()"
      role="img"
      [attr.aria-label]="
        phase() === 'stt_listening'
          ? 'STT listening — end phrase active'
          : 'Waiting for wake phrase only'
      ">
    </div>

    <div class="cv-wake-test-meta">
      <p-tag [value]="phaseLabel()" [severity]="phaseSeverity()" />
      <p-tag [value]="'Wake: ' + startPhrase()" severity="secondary" />
      <p-tag [value]="submitModeLabel()" severity="secondary" />
      <p-tag
        [value]="isolated ? 'COOP/COEP OK' : 'COOP/COEP missing'"
        [severity]="isolated ? 'success' : 'warn'" />
    </div>

    <p class="cv-wake-test-status">{{ statusText() }}</p>
    <p class="cv-wake-test-partial">{{ partialText() }}</p>

    @if (phraseConflict()) {
      <p-message
        severity="error"
        variant="simple"
        text="Wake and end phrases must be different — e.g. start / send." />
    }

    @if (!isolated) {
      <p-message
        severity="warn"
        variant="simple"
        text="Open via the bridge URL (unified port) or ng serve — SharedArrayBuffer needs COOP/COEP headers." />
    }

    <p-message
      severity="secondary"
      variant="simple"
      text="Same flow as Voice tab: Phase 1 (red) = wake phrase only — end phrase is ignored. Phase 2 (green) = STT on + end phrase Vosk. Saying the end phrase during phase 1 does nothing." />

    <div class="cv-wake-test-meta">
      @if (!isRunning()) {
        <p-button label="Start stream" icon="pi pi-play" (onClick)="start()" [disabled]="phraseConflict()" />
      } @else {
        <p-button label="Stop" icon="pi pi-stop" severity="danger" (onClick)="stop()" />
      }
    </div>
  </div>
</p-card>
